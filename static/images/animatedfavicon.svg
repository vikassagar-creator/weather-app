<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Sun -->
  <circle cx="22" cy="22" r="10" fill="#FDB813">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 22 22"
      to="360 22 22"
      dur="8s"
      repeatCount="indefinite"/>
  </circle>

  <!-- Cloud -->
  <path
    d="M18 45
       C18 36 25 30 34 30
       C37 23 47 22 52 28
       C59 28 62 34 62 40
       C62 47 56 51 49 51
       H20
       C14 51 10 48 10 43
       C10 39 13 36 18 36Z"
    fill="#3B82F6">

    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0; 2 0; 0 0"
      dur="3s"
      repeatCount="indefinite"/>
  </path>

</svg>
