<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Weather hero illustration</title>
<desc>A bright sun behind a fluffy cloud, with a smaller cloud drifting nearby and a few birds in the sky</desc>

<defs>
<radialGradient id="sunGlowHero" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#FAC775" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#FAC775" stop-opacity="0"/>
</radialGradient>
<linearGradient id="cloudMain" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#FFFFFF"/>
<stop offset="100%" stop-color="#E4E7EC"/>
</linearGradient>
<linearGradient id="cloudSmall" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#F3F5F8"/>
<stop offset="100%" stop-color="#D7DCE3"/>
</linearGradient>
</defs>

<circle cx="270" cy="150" r="120" fill="url(#sunGlowHero)"/>

<g>
<circle cx="270" cy="150" r="62" fill="#FAC775"/>
<g stroke="#EF9F27" stroke-width="5" stroke-linecap="round">
<line x1="270" y1="55" x2="270" y2="72"/>
<line x1="270" y1="228" x2="270" y2="245"/>
<line x1="155" y1="150" x2="172" y2="150"/>
<line x1="368" y1="150" x2="385" y2="150"/>
<line x1="188" y1="68" x2="200" y2="80"/>
<line x1="340" y1="220" x2="352" y2="232"/>
<line x1="188" y1="232" x2="200" y2="220"/>
<line x1="340" y1="80" x2="352" y2="68"/>
</g>
</g>

<g stroke="#F5CE8F" stroke-width="4" stroke-linecap="round" opacity="0.9">
<line x1="60" y1="90" x2="95" y2="90"/>
<line x1="45" y1="105" x2="80" y2="105"/>
<line x1="70" y1="120" x2="100" y2="120"/>
</g>

<g fill="#26215C" opacity="0.75">
<path d="M70 60 q10 -10 20 0 q10 -10 20 0" stroke="#26215C" stroke-width="3" fill="none" stroke-linecap="round"/>
<path d="M370 260 q9 -9 18 0 q9 -9 18 0" stroke="#26215C" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<g>
<ellipse cx="330" cy="290" rx="30" ry="20" fill="url(#cloudSmall)"/>
<ellipse cx="305" cy="278" rx="22" ry="18" fill="url(#cloudSmall)"/>
<ellipse cx="355" cy="280" rx="24" ry="19" fill="url(#cloudSmall)"/>
</g>

<g>
<ellipse cx="200" cy="320" rx="90" ry="42" fill="url(#cloudMain)"/>
<ellipse cx="145" cy="300" rx="55" ry="46" fill="url(#cloudMain)"/>
<ellipse cx="230" cy="285" rx="60" ry="52" fill="url(#cloudMain)"/>
<ellipse cx="280" cy="305" rx="45" ry="38" fill="url(#cloudMain)"/>
</g>

<ellipse cx="240" cy="400" rx="150" ry="14" fill="#26215C" opacity="0.08"/>

</svg>
